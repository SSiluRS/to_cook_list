name: Build Android APK

on:
  push:
    tags:
      - 'android-v*.*.*'
  workflow_dispatch:

permissions:
  contents: write   # needed to upload APK to GitHub Release

jobs:
  build_apk:
    name: Build Android Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build Vite frontend (production)
        run: npm run build
        working-directory: frontend
        env:
          # APK uses absolute URL — requests go directly to production server
          VITE_API_BASE_URL: https://tocook.ssilurs.ru/api

      - name: Sync Capacitor Android project
        run: npx cap sync android
        working-directory: frontend

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant Gradle execute permission
        run: chmod +x gradlew
        working-directory: frontend/android

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon
        working-directory: frontend/android

      - name: Rename APK with version tag
        run: |
          VERSION="${{ github.ref_name }}"
          cp frontend/android/app/build/outputs/apk/debug/app-debug.apk \
             to_cook_list-${VERSION}.apk

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: to_cook_list-${{ github.ref_name }}.apk
          name: Android APK ${{ github.ref_name }}
          body: |
            ### To Cook List — Android APK

            **Версия:** `${{ github.ref_name }}`

            #### Как установить:
            1. Скачайте файл `.apk` ниже
            2. Разрешите установку из неизвестных источников в настройках Android
            3. Откройте скачанный файл и нажмите «Установить»

            > ⚠️ Это Debug-сборка. Для публикации в Google Play потребуется Release APK с подписью.
