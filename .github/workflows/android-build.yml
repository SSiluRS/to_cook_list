name: Build Android APK

on:
  push:
    branches: [ "master" ]
    paths:
      - 'frontend/**'
      - '.github/workflows/android-build.yml'
    tags:
      - 'android-v*.*.*'
  workflow_dispatch:

permissions:
  contents: write   # needed to upload APK to GitHub Release

jobs:
  build_apk:
    name: Build Android Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build Vite frontend (production)
        run: npm run build
        working-directory: frontend
        env:
          # APK uses absolute URL — requests go directly to production server
          VITE_API_BASE_URL: https://tocook.ssilurs.ru/api

      - name: Add Capacitor Android platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          else
            echo "Android platform already added in repository, skipping add..."
          fi
        working-directory: frontend

      - name: Sync Capacitor Android project
        run: npx cap sync android
        working-directory: frontend

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant Gradle execute permission
        run: chmod +x gradlew
        working-directory: frontend/android

      - name: Determine APK version name
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "APK_NAME=to_cook_list-${GITHUB_REF_NAME}.apk" >> $GITHUB_OUTPUT
          else
            SHORT_SHA=${GITHUB_SHA::7}
            echo "APK_NAME=to_cook_list-dev-${SHORT_SHA}.apk" >> $GITHUB_OUTPUT
          fi

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon
        working-directory: frontend/android
        env:
          SIGNING_STORE_PASSWORD: tocookpassword
          SIGNING_KEY_ALIAS: to_cook_alias
          SIGNING_KEY_PASSWORD: tocookpassword

      - name: Copy APK to workspace root
        run: cp frontend/android/app/build/outputs/apk/release/app-release.apk ${{ steps.version.outputs.APK_NAME }}

      - name: Upload APK as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: to_cook_list-android-apk
          path: ${{ steps.version.outputs.APK_NAME }}
          retention-days: 14

      - name: Create and Upload APK to GitHub Release (only on tags)
        if: startsWith(github.ref, 'refs/tags/android-v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.version.outputs.APK_NAME }}
          name: Android ${{ github.ref_name }}
          body: |
            ### 📱 To Cook List — Android

            **Версия:** `${{ github.ref_name }}`

            #### Как установить:
            1. Скачайте файл `${{ steps.version.outputs.APK_NAME }}` ниже
            2. Разрешите установку из неизвестных источников в настройках Android
            3. Откройте скачанный файл и нажмите «Установить»

            _Сборка подписана release-ключом и собрана автоматически через GitHub Actions._
