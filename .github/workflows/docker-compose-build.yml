name: Build & Push split services (GHCR)

on:
  push:
    branches: [ "master" ]
    tags:
      - 'back-v*.*.*'
      - 'front-v*.*.*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  detect_changes:
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    outputs:
      back_changed: ${{ steps.filter.outputs.back }}
      front_changed: ${{ steps.filter.outputs.front }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            back:
              - 'backend/**'
            front:
              - 'frontend/**'

  build_back_master:
    needs: detect_changes
    if: github.ref == 'refs/heads/master' && needs.detect_changes.outputs.back_changed == 'true' && !contains(github.event.head_commit.message, 'release v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase owner & short sha
        run: |
          echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push BACK (master)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/to_cook_list_back:latest
            ghcr.io/${{ env.OWNER_LC }}/to_cook_list_back:${{ env.SHORT_SHA }}

  build_front_master:
    needs: detect_changes
    if: github.ref == 'refs/heads/master' && needs.detect_changes.outputs.front_changed == 'true' && !contains(github.event.head_commit.message, 'release v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase owner & short sha
        run: |
          echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push FRONT (master)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: true
          build-args: |
            VITE_API_BASE_URL=/api
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/to_cook_list_front:latest
            ghcr.io/${{ env.OWNER_LC }}/to_cook_list_front:${{ env.SHORT_SHA }}

  build_back_tag:
    if: startsWith(github.ref, 'refs/tags/back-v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Lowercase owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push BACK (tag)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/to_cook_list_back:${{ github.ref_name }}
            ghcr.io/${{ env.OWNER_LC }}/to_cook_list_back:latest

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep '^back-v' | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            LOG=$(git log --pretty=format:"- %s" -- backend/)
          else
            LOG=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s" -- backend/)
          fi
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "$LOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Backend ${{ github.ref_name }}
          body: |
            ### 🐍 Backend — Python / FastAPI

            **Docker образ:** `ghcr.io/${{ env.OWNER_LC }}/to_cook_list_back:${{ github.ref_name }}`

            #### Обновление на сервере:
            ```bash
            docker compose pull backend && docker compose up -d backend
            ```

            #### Изменения с прошлого релиза:
            ${{ steps.changelog.outputs.CHANGELOG }}

  build_front_tag:
    if: startsWith(github.ref, 'refs/tags/front-v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Lowercase owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push FRONT (tag)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: true
          build-args: |
            VITE_API_BASE_URL=/api
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/to_cook_list_front:${{ github.ref_name }}
            ghcr.io/${{ env.OWNER_LC }}/to_cook_list_front:latest

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep '^front-v' | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            LOG=$(git log --pretty=format:"- %s" -- frontend/src/ frontend/public/ frontend/index.html)
          else
            LOG=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s" -- frontend/src/ frontend/public/ frontend/index.html)
          fi
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "$LOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Frontend ${{ github.ref_name }}
          body: |
            ### 🌐 Frontend — Vue 3 / Vite

            **Docker образ:** `ghcr.io/${{ env.OWNER_LC }}/to_cook_list_front:${{ github.ref_name }}`

            #### Обновление на сервере:
            ```bash
            docker compose pull frontend && docker compose up -d frontend
            ```

            #### Изменения с прошлого релиза:
            ${{ steps.changelog.outputs.CHANGELOG }}

