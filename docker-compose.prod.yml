version: '3.8'

services:
  backend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER_LOWERCASE:-ssilurs}/to_cook_list_back:latest
    container_name: to_cook_list_backend
    restart: always
    environment:
      - DATABASE_URL=${DATABASE_URL}
    ports:
      - "8000:8000"

  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER_LOWERCASE:-ssilurs}/to_cook_list_front:latest
    container_name: to_cook_list_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
